<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Groundnut Disease Detection</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h1>🌱 Groundnut Disease Detection</h1>
    <p class="subtitle">Upload a leaf image to detect diseases</p>
    <div id="connectionStatus" class="connection-status"></div>
    <div class="card">
        <input type="file" id="imageInput" hidden>
        <label for="imageInput" class="upload-box">
            <span>📁 Click to upload image</span>
        </label>
        <img id="preview" class="hidden"/>
        <button onclick="uploadImage()">Detect Disease</button>
        <button onclick="preloadModel()" id="preloadBtn" style="margin-top: 10px; background: #3498db;">Pre-load Model (1-2 min)</button>
        <div id="loader" class="loader hidden"></div>
    </div>
    <div class="card result-card hidden" id="resultCard">
        <h2>Detection Result</h2>
        <img id="outputImage"/>
        <div id="results" class="results"></div>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
